#cloud-config
# edcloud instance bootstrap — Docker, Tailscale, Portainer, self-shutdown, state volume
# Variables: ${TAILSCALE_AUTH_KEY_SSM_PARAMETER}, ${TAILSCALE_HOSTNAME}, ${AWS_REGION}

package_update: true
package_upgrade: true

packages:
  # Core utilities
  - apt-transport-https
  - awscli
  - bash-completion
  - build-essential
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - unattended-upgrades
  - wget

  # Developer tools
  - git
  - gh
  - make
  - cmake
  - pkg-config

  # Terminal tools
  - byobu
  - tmux
  - screen
  - neomutt
  - vim-tiny
  - neovim
  - tree
  - htop
  - btop
  - ncdu

  # Search and file tools
  - fd-find
  - fzf
  - ripgrep
  - silversearcher-ag
  - jq
  - yq

  # Network tools
  - dnsutils
  - net-tools
  - iputils-ping
  - traceroute
  - nmap
  - tcpdump
  - netcat-openbsd

  # Archive tools
  - unzip
  - zip
  - p7zip-full
  - tar
  - gzip
  - bzip2
  - xz-utils

  # System tools
  - rsync
  - rclone
  - strace
  - lsof
  - sysstat
  - xclip

  # Python environment
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - python3-setuptools
  - python3-wheel
  - python3-pytest
  - python3-ipython
  - pipx
  - python-is-python3

  # Additional useful tools
  - sqlite3
  - postgresql-client
  - redis-tools
  - certbot

# --------------------------------------------------------------------------
# Write files before runcmd
# --------------------------------------------------------------------------
write_files:
  # Idle-shutdown: powers down if no Tailscale SSH + low CPU for 30 min
  - path: /usr/local/bin/edcloud-idle-shutdown
    permissions: "0755"
    content: |
      #!/bin/bash
      # edcloud idle-shutdown — stop instance if unused for IDLE_MINUTES
      set -euo pipefail
      IDLE_MINUTES=30
      STATE_FILE="/tmp/edcloud-idle-since"

      # Check for active Tailscale SSH sessions
      TS_CONNECTIONS=$(tailscale status --json 2>/dev/null \
        | jq '[.Peer // {} | to_entries[] | select(.value.Active == true)] | length' 2>/dev/null || echo "0")

      # Check 5-minute CPU load average (< 0.15 = idle for a 2-vCPU box)
      LOAD=$(awk '{print $2}' /proc/loadavg)
      IDLE=$(awk "BEGIN {print ($LOAD < 0.15) ? 1 : 0}")

      if [ "$TS_CONNECTIONS" -gt 0 ] || [ "$IDLE" -eq 0 ]; then
          # Active — reset idle timer
          rm -f "$STATE_FILE"
          exit 0
      fi

      # Idle — track how long
      if [ ! -f "$STATE_FILE" ]; then
          date +%s > "$STATE_FILE"
          exit 0
      fi

      IDLE_SINCE=$(cat "$STATE_FILE")
      NOW=$(date +%s)
      ELAPSED=$(( (NOW - IDLE_SINCE) / 60 ))

      if [ "$ELAPSED" -ge "$IDLE_MINUTES" ]; then
          logger -t edcloud "Idle for ${ELAPSED}m, shutting down."
          /usr/bin/systemctl poweroff
      fi

  # Systemd timer for idle-shutdown (every 5 minutes)
  - path: /etc/systemd/system/edcloud-idle-shutdown.service
    content: |
      [Unit]
      Description=edcloud idle shutdown check
      After=network-online.target tailscaled.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/edcloud-idle-shutdown

  - path: /etc/systemd/system/edcloud-idle-shutdown.timer
    content: |
      [Unit]
      Description=Check for idle edcloud instance every 5 minutes

      [Timer]
      OnBootSec=10min
      OnUnitActiveSec=5min
      Persistent=true

      [Install]
      WantedBy=timers.target

  # Docker compose directory marker
  - path: /opt/edcloud/.env
    content: |
      EDCLOUD_MANAGED=true

# --------------------------------------------------------------------------
# Bootstrap commands
# --------------------------------------------------------------------------
runcmd:
  # --- Docker (official repo) ---
  - |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
      > /etc/apt/sources.list.d/docker.list
    apt-get update -qq
    apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
    systemctl enable docker
    usermod -aG docker ubuntu

  # --- Tailscale ---
  - |
    curl -fsSL https://tailscale.com/install.sh | sh
    TS_AUTH_KEY=$(aws ssm get-parameter \
      --name "${TAILSCALE_AUTH_KEY_SSM_PARAMETER}" \
      --with-decryption --query 'Parameter.Value' \
      --output text --region "${AWS_REGION}")
    tailscale up --auth-key="$TS_AUTH_KEY" --hostname="${TAILSCALE_HOSTNAME}" --ssh
    unset TS_AUTH_KEY

  # --- Durable state volume (/opt/edcloud/state) ---
  - |
    ROOT_SOURCE=$(findmnt -n -o SOURCE /)
    ROOT_PARENT=$(lsblk -no PKNAME "$ROOT_SOURCE" 2>/dev/null || true)
    if [ -n "$ROOT_PARENT" ]; then
      ROOT_DISK="/dev/$ROOT_PARENT"
    else
      ROOT_DISK="$ROOT_SOURCE"
    fi

    STATE_DEV="/dev/sdf"
    if [ ! -b "$STATE_DEV" ]; then
      STATE_DEV=$(lsblk -dpno NAME,TYPE | awk '$2=="disk"{print $1}' \
        | grep -v "^${ROOT_DISK}$" | head -n1 || true)
    fi

    if [ -z "${STATE_DEV:-}" ] || [ ! -b "$STATE_DEV" ]; then
      logger -t edcloud "State volume not found; skipping /opt/edcloud/state mount."
    else
      if ! blkid "$STATE_DEV" >/dev/null 2>&1; then
        mkfs.ext4 -F "$STATE_DEV"
      fi
      mkdir -p /opt/edcloud/state
      UUID=$(blkid -s UUID -o value "$STATE_DEV")
      if ! grep -q "$UUID" /etc/fstab; then
        echo "UUID=$UUID /opt/edcloud/state ext4 defaults,nofail 0 2" >> /etc/fstab
      fi
      mount -a

      # Keep ubuntu home on the durable state volume.
      mkdir -p /opt/edcloud/state/home/ubuntu
      if [ -z "$(ls -A /opt/edcloud/state/home/ubuntu 2>/dev/null)" ]; then
        rsync -a /home/ubuntu/ /opt/edcloud/state/home/ubuntu/
      fi

      if ! grep -qE '^/opt/edcloud/state/home/ubuntu[[:space:]]+/home/ubuntu[[:space:]]+none[[:space:]]+bind' /etc/fstab; then
        echo "/opt/edcloud/state/home/ubuntu /home/ubuntu none bind 0 0" >> /etc/fstab
      fi
      if ! mountpoint -q /home/ubuntu; then
        mount /home/ubuntu || mount -a
      fi

      chown -R ubuntu:ubuntu /opt/edcloud/state
      chmod 700 /home/ubuntu
      if [ -d /home/ubuntu/.ssh ]; then
        chmod 700 /home/ubuntu/.ssh
      fi

      # Keep tailscaled state durable to preserve node identity across rebuilds.
      mkdir -p /opt/edcloud/state/tailscale
      if [ -z "$(ls -A /opt/edcloud/state/tailscale 2>/dev/null)" ] && [ -d /var/lib/tailscale ]; then
        rsync -a /var/lib/tailscale/ /opt/edcloud/state/tailscale/
      fi

      if ! grep -qE '^/opt/edcloud/state/tailscale[[:space:]]+/var/lib/tailscale[[:space:]]+none[[:space:]]+bind' /etc/fstab; then
        echo "/opt/edcloud/state/tailscale /var/lib/tailscale none bind 0 0" >> /etc/fstab
      fi
      mkdir -p /var/lib/tailscale
      if ! mountpoint -q /var/lib/tailscale; then
        mount /var/lib/tailscale || mount -a
      fi

      # Keep compose files durable across reprovision.
      mkdir -p /opt/edcloud/state/compose
      mkdir -p /opt/edcloud/compose
      if [ -z "$(ls -A /opt/edcloud/state/compose 2>/dev/null)" ] && [ -n "$(ls -A /opt/edcloud/compose 2>/dev/null)" ]; then
        rsync -a /opt/edcloud/compose/ /opt/edcloud/state/compose/
      fi

      if ! grep -qE '^/opt/edcloud/state/compose[[:space:]]+/opt/edcloud/compose[[:space:]]+none[[:space:]]+bind' /etc/fstab; then
        echo "/opt/edcloud/state/compose /opt/edcloud/compose none bind 0 0" >> /etc/fstab
      fi
      if ! mountpoint -q /opt/edcloud/compose; then
        mount /opt/edcloud/compose || mount -a
      fi

      # Keep Portainer data durable across reprovision.
      mkdir -p /opt/edcloud/state/portainer-data
      mkdir -p /opt/edcloud/portainer-data
      if [ -z "$(ls -A /opt/edcloud/state/portainer-data 2>/dev/null)" ] && [ -n "$(ls -A /opt/edcloud/portainer-data 2>/dev/null)" ]; then
        rsync -a /opt/edcloud/portainer-data/ /opt/edcloud/state/portainer-data/
      fi

      if ! grep -qE '^/opt/edcloud/state/portainer-data[[:space:]]+/opt/edcloud/portainer-data[[:space:]]+none[[:space:]]+bind' /etc/fstab; then
        echo "/opt/edcloud/state/portainer-data /opt/edcloud/portainer-data none bind 0 0" >> /etc/fstab
      fi
      if ! mountpoint -q /opt/edcloud/portainer-data; then
        mount /opt/edcloud/portainer-data || mount -a
      fi

      # Keep Docker engine data durable across reprovision.
      mkdir -p /opt/edcloud/state/docker
      if [ -z "$(ls -A /opt/edcloud/state/docker 2>/dev/null)" ] && [ -n "$(ls -A /var/lib/docker 2>/dev/null)" ]; then
        rsync -a /var/lib/docker/ /opt/edcloud/state/docker/
      fi

      printf '%s\n' \
        '{' \
        '  "data-root": "/opt/edcloud/state/docker"' \
        '}' > /etc/docker/daemon.json

      systemctl daemon-reload
      systemctl restart docker
    fi

  # --- Portainer CE ---
  - |
    TS_IP=$(tailscale ip -4)
    docker run -d \
      --name portainer \
      --restart=always \
      -p "${TS_IP}:9443:9443" \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -v /opt/edcloud/portainer-data:/data \
      portainer/portainer-ce:lts

  # --- Homebrew + LazyVim baseline ---
  - |
    NVIM_VERSION="v0.11.3"
    NVIM_TARBALL_URL="https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz"
    curl -fsSL "$NVIM_TARBALL_URL" -o /tmp/nvim-linux-x86_64.tar.gz
    rm -rf /opt/nvim-linux-x86_64
    tar -C /opt -xzf /tmp/nvim-linux-x86_64.tar.gz
    ln -sfn /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

    export NONINTERACTIVE=1
    if [ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    fi

    cat >/etc/profile.d/edcloud-brew.sh <<'BREWENV'
    if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
    fi
    BREWENV
    chmod 0644 /etc/profile.d/edcloud-brew.sh

    runuser -u ubuntu -- bash -lc '
      set -euo pipefail
      mkdir -p "$HOME/.config"
      if [ ! -d "$HOME/.config/nvim" ]; then
        git clone --depth=1 https://github.com/LazyVim/starter "$HOME/.config/nvim"
        rm -rf "$HOME/.config/nvim/.git"
      fi
    '

  # --- Node.js LTS (via NodeSource) ---
  - |
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
    apt-get install -y nodejs
    npm install -g npm@11.9.0 @openai/codex@0.98.0 cline@2.2.2 @google/gemini-cli

  # --- Python developer tooling (pipx-managed, persistent on state volume) ---
  - |
    runuser -u ubuntu -- bash -lc '
      set -euo pipefail
      pipx ensurepath
      pipx install --force ruff
      pipx install --force mypy
    '

  # --- GitHub CLI authentication (from SSM if available) ---
  - |
    runuser -u ubuntu -- bash -lc '
      set -euo pipefail
      if command -v aws &>/dev/null && command -v gh &>/dev/null; then
        # Try to get GitHub token from SSM (requires IAM role with SSM read permission)
        GITHUB_TOKEN=$(aws ssm get-parameter \
          --name /edcloud/github_token \
          --with-decryption \
          --query "Parameter.Value" \
          --output text 2>/dev/null || echo "")

        if [ -n "$GITHUB_TOKEN" ]; then
          # Configure gh CLI with token
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          gh auth setup-git
          echo "✅ GitHub CLI authenticated from SSM"
        fi
      fi
    '

  # --- Pull non-secret personal repos (dotfiles/bin/llm-config) ---
  - |
    runuser -u ubuntu -- bash -lc '
      set -euo pipefail

      if ! command -v gh &>/dev/null; then
        exit 0
      fi

      if ! gh auth status &>/dev/null; then
        echo "ℹ️ gh not authenticated; skipping dotfiles/bin/llm-config sync"
        exit 0
      fi

      GH_USER=$(gh api user --jq .login 2>/dev/null || true)
      if [ -z "$GH_USER" ]; then
        echo "ℹ️ could not resolve GitHub username; skipping repo sync"
        exit 0
      fi

      mkdir -p "$HOME/src" "$HOME/.local/bin"

      sync_repo() {
        local name="$1"
        local repo_url="https://github.com/${GH_USER}/${name}.git"
        local target="$HOME/src/${name}"

        if [ -d "$target/.git" ]; then
          git -C "$target" pull --ff-only || true
        else
          git clone "$repo_url" "$target" || true
        fi
      }

      sync_repo dotfiles
      sync_repo bin
      sync_repo llm-config

      if [ -x "$HOME/src/dotfiles/install.sh" ]; then
        "$HOME/src/dotfiles/install.sh" || true
      fi

      if [ -d "$HOME/src/bin" ]; then
        find "$HOME/src/bin" -maxdepth 1 -type f -perm -u+x -exec ln -sfn {} "$HOME/.local/bin/" \;
      fi
    '

  # --- AI CLI profile note ---
  # Baseline installs Codex + Cline + Gemini CLI via npm above.
  # Keep this path game-free for default rebuilds.

  # --- Enable idle-shutdown timer ---
  - systemctl daemon-reload
  - systemctl enable --now edcloud-idle-shutdown.timer

  # --- Signal completion ---
  - echo "edcloud bootstrap complete $(date -Iseconds)" > /tmp/edcloud-ready

final_message: "edcloud instance ready after $UPTIME seconds."
