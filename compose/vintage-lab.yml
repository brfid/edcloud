# Vintage Computing Lab — VAX + PDP-11 SIMH emulators
# Example workload stack for edcloud.
#
# Deploy via Portainer or:
#   docker compose -f vintage-lab.yml up -d
#
# Console access (from any Tailscale device):
#   telnet edcloud 2323   # VAX 4.3BSD
#   telnet edcloud 2327   # PDP-11 2.11BSD
#
# Both machines share /opt/edcloud/shared for file exchange.

services:
  # =========================================================================
  # VAX 11/780 — 4.3BSD
  # =========================================================================
  vax:
    container_name: vax-host
    hostname: vax-host
    image: jguillaumes/simh-vaxbsd:latest
    environment:
      - SIMH_USE_CONTAINER=yes
    ports:
      - "2323:2323"   # VAX console (telnet)
    volumes:
      - vax-data:/machines/data
      - shared:/opt/shared
    networks:
      vintage:
        ipv4_address: 172.30.0.10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # PDP-11/73 — 2.11BSD
  # =========================================================================
  pdp11:
    container_name: pdp11-host
    hostname: pdp11-host
    # TODO: Replace with your PDP-11 SIMH image.
    # The brfid.github.io repo builds this from vintage/Dockerfile.pdp11.
    # For now, use a placeholder — update after migrating disk images.
    image: jguillaumes/simh-vaxbsd:latest
    ports:
      - "2327:2327"   # PDP-11 console (telnet)
    volumes:
      - pdp11-data:/machines/data
      - shared:/opt/shared
    networks:
      vintage:
        ipv4_address: 172.30.0.50
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vintage:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  vax-data:
  pdp11-data:
  shared:
